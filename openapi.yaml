openapi: 3.0.3
info:
  title: Network Contract v0 (Hackathon)
  version: "0.0.1"
  description: |
    Minimal LAN routing + compute agent contract for non-streaming LLM chat.
    Trusted network, <=5 servers, no version negotiation, no multimodal.

servers:
  - url: http://localhost:8080
    description: Router (example)
  - url: http://localhost:8081
    description: Compute Agent (example)

tags:
  - name: router
    description: Endpoints served by the routing server
  - name: compute
    description: Endpoints served by the compute agent

paths:
  /register:
    post:
      tags: [router]
      summary: Compute -> Router one-time registration (capabilities)
      operationId: registerCompute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /heartbeat:
    post:
      tags: [router]
      summary: Compute -> Router heartbeat (dynamic load)
      operationId: heartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
      responses:
        "200":
          description: Heartbeat accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /route:
    post:
      tags: [router]
      summary: Client -> Router route selection (metadata only)
      operationId: routeRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRequest"
      responses:
        "200":
          description: Routing decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteResponse"
        "503":
          description: No capable servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Optional duplicate request id handling
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /run:
    post:
      tags: [compute]
      summary: Client -> Compute run (full request; non-streaming)
      operationId: runCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunRequest"
      responses:
        "200":
          description: Completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunResponse"
        "400":
          description: Bad request / unknown model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Server busy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: Upstream timeout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    OkResponse:
      type: object
      additionalProperties: false
      properties:
        ok:
          type: boolean
      required: [ok]

    ErrorResponse:
      type: object
      additionalProperties: false
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: NO_CAPABLE_SERVERS
        detail:
          type: string
          description: Human-readable details
          example: No servers currently support model_id=llama3.1-8b-instruct-q4_k_m
      required: [error, detail]

    Status:
      type: string
      enum: [READY, BUSY, DRAINING]

    DeviceType:
      type: string
      enum: [CPU, GPU]

    RegisterRequest:
      type: object
      additionalProperties: false
      properties:
        server_id:
          type: string
          example: compute-1
        endpoint:
          type: string
          description: Base URL of compute agent (not LMStudio)
          example: http://192.168.1.50:8081
        models:
          type: array
          items:
            type: string
          example: ["llama3.1-8b-instruct-q4_k_m", "mistral-7b-instruct-q4"]
        max_concurrency:
          type: integer
          minimum: 1
          example: 1
        context_limit:
          type: integer
          nullable: true
          description: Optional max context length supported
          example: 8192
        device_type:
          $ref: "#/components/schemas/DeviceType"
        vram_gb:
          type: number
          nullable: true
          example: 12
      required: [server_id, endpoint, models, max_concurrency, device_type]

    HeartbeatRequest:
      type: object
      additionalProperties: false
      properties:
        server_id:
          type: string
          example: compute-1
        timestamp_ms:
          type: integer
          format: int64
          example: 1760000000123
        status:
          $ref: "#/components/schemas/Status"
        in_flight:
          type: integer
          minimum: 0
          example: 0
        ema_tps:
          type: number
          nullable: true
          description: Exponential moving average tokens/sec (real or estimated)
          example: 28.4
        last_job_ms:
          type: integer
          nullable: true
          example: 1420
      required: [server_id, timestamp_ms, status, in_flight]

    RouteRequest:
      type: object
      additionalProperties: false
      properties:
        request_id:
          type: string
          description: UUID generated by client (idempotency key)
          example: 0f6f0c2a-44a6-4db3-9f55-dedddaf9d7ce
        timestamp_ms:
          type: integer
          format: int64
          example: 1760000000456
        model_id:
          type: string
          example: llama3.1-8b-instruct-q4_k_m
        prompt_chars:
          type: integer
          minimum: 0
          example: 812
        estimated_prompt_tokens:
          type: integer
          nullable: true
          minimum: 0
          description: Optional; if omitted, router may approximate from chars
          example: 203
        max_tokens:
          type: integer
          minimum: 1
          example: 256
      required: [request_id, timestamp_ms, model_id, prompt_chars, max_tokens]

    RouteResponse:
      type: object
      additionalProperties: false
      properties:
        request_id:
          type: string
        server_id:
          type: string
        endpoint:
          type: string
          description: Base URL of compute agent to call /run on
        reason:
          type: string
          description: Debug reason for routing choice (optional but useful)
          example: least_in_flight_tie_break_by_estimated_runtime
      required: [request_id, server_id, endpoint, reason]

    Role:
      type: string
      enum: [system, user, assistant]

    Message:
      type: object
      additionalProperties: false
      properties:
        role:
          $ref: "#/components/schemas/Role"
        content:
          type: string
      required: [role, content]

    RunRequest:
      type: object
      additionalProperties: false
      properties:
        request_id:
          type: string
        timestamp_ms:
          type: integer
          format: int64
        model_id:
          type: string
        max_tokens:
          type: integer
          minimum: 1
        messages:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/Message"
      required: [request_id, timestamp_ms, model_id, max_tokens, messages]

    Usage:
      type: object
      additionalProperties: false
      properties:
        prompt_tokens:
          type: integer
          minimum: 0
          nullable: true
        completion_tokens:
          type: integer
          minimum: 0
          nullable: true
        total_tokens:
          type: integer
          minimum: 0
          nullable: true
      required: [prompt_tokens, completion_tokens, total_tokens]

    Timing:
      type: object
      additionalProperties: false
      properties:
        elapsed_ms:
          type: integer
          minimum: 0
      required: [elapsed_ms]

    Output:
      type: object
      additionalProperties: false
      properties:
        role:
          $ref: "#/components/schemas/Role"
        content:
          type: string
      required: [role, content]

    RunResponse:
      type: object
      additionalProperties: false
      properties:
        request_id:
          type: string
        model_id:
          type: string
        cached:
          type: boolean
          nullable: true
          description: Present and true if served from idempotency cache
        output:
          $ref: "#/components/schemas/Output"
        usage:
          $ref: "#/components/schemas/Usage"
        timing:
          $ref: "#/components/schemas/Timing"
      required: [request_id, model_id, output, usage, timing]